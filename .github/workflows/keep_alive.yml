name: Keep Alive

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://investiqo.streamlit.app)
          echo "Response: $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "App returned $STATUS - may be waking up"
          fi
